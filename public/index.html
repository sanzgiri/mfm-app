<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meditations for Mortals - Four Week Journey</title>
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#8B7355">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>

<body>
  <div id="main-view">
    <header>
      <h1>Meditations for Mortals</h1>
      <p class="subtitle">Four Weeks to Embrace Your Limitations</p>
    </header>

    <div class="top-nav">
      <button id="btn-intro" class="nav-link">Introduction</button>
      <span class="separator">•</span>
      <button id="btn-howto" class="nav-link">How to Use</button>
    </div>

    <div class="progress-container">
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
      </div>
      <p id="progress-text" class="progress-text">0 days completed</p>
      <p id="streak-text" class="streak-text"></p>
      <button id="resume-btn" type="button" class="btn-primary resume-btn" style="display:none"></button>
    </div>

    <div id="app-content">
      <!-- Dynamic Content (Intro, Weeks, Days) goes here -->
    </div>

    <div class="data-controls">
      <button id="btn-export" type="button" class="btn-text-small">Export notes</button>
      <button id="btn-import" type="button" class="btn-text-small">Import backup</button>
      <button id="btn-reset" type="button" class="btn-text-small btn-text-danger">Reset progress</button>
      <input id="import-input" type="file" accept="application/json,.json" hidden>
    </div>

    <footer class="app-footer">
      <a href="#" id="link-about">About</a> •
      <a href="#" id="link-references">References</a> •
      <a href="#" id="link-conclusion">Conclusion</a>
    </footer>
  </div>

  <!-- Detail View (Overlay) -->
  <div id="detail-view" class="detail-view" style="display: none;" aria-hidden="true">
    <button id="back-btn" type="button" class="back-btn">← Back</button>
    <div id="detail-content" class="detail-content">
      <!-- Dynamic Detail Content -->
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>

</html>
